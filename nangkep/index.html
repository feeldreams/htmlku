      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const kelopak = Array.from({ length: 20 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 5 + 2,
        speed: Math.random() * 2 + 1
      }));

      function gambarKelopak() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

          ctx.beginPath();
          ctx.arc(petal.x, petal.y, petal.radius, 0, Math.PI * 2);
          ctx.fillStyle = '#f87171';

          petal.y += petal.speed;
          if (petal.y > canvas.height) petal.y = -petal.radius;

        });

    // Catch My Hearts logic (pengganti memory game)
    let catchScore = 0;
    let catchTimeLeft = 10;
    let catchTimerId = null;
    let heartSpawner = null;
    let gameRunning = false;

    function mulaiCatchGame() {
        if (gameRunning) return;
        gameRunning = true;
        catchScore = 0;
        catchTimeLeft = 10;
        document.getElementById('statusGame').textContent = `⏳: ${catchTimeLeft} detik | 💖: ${catchScore}`;
        document.getElementById('gameArea').innerHTML = '';
        document.getElementById('tomMulai').style = "opacity:0;transform:scale(0);pointer-events:none;transition:all .5s ease";

        // Timer
        catchTimerId = setInterval(() => {
            catchTimeLeft--;
            document.getElementById('statusGame').textContent = `⏳: ${catchTimeLeft} detik | 💖: ${catchScore}`;
            if (catchTimeLeft <= 0) {
                clearInterval(catchTimerId);
                    clearInterval(heartSpawner);
                    gameRunning = false;
                    setTimeout(() => {
                        document.getElementById(`hal2`).style = "transform:scale(0);transition:all .6s ease";
                        setTimeout(() => { pindahHal(3); }, 450);
                    }, 730);
                    /*
                clearInterval(catchTimerId);
                clearInterval(heartSpawner);
                gameRunning = false;*/
                //alert("Waktu habis! Coba lagi ya sayang~ 💔\nMinimal 12 hati untuk lanjut~");
            }
        }, 1000);

        // Spawn hati
        heartSpawner = setInterval(() => {
            if (!gameRunning) return;

            const area = document.getElementById('gameArea');
            const currentHearts = area.querySelectorAll('.heart-catch').length;

            if (currentHearts >= 3) return;

            const padding = 10;               // lebih besar biar aman dari tepi
            const effectiveHeartSize = 70;    // ukuran efektif + toleransi (emoji ~42-50px + margin)
            const minCenterDistance = 50;    // jarak pusat minimal (lebih besar = lebih jarang dekat)

            const safeWidth  = area.offsetWidth  - effectiveHeartSize - (padding * 2);
            const safeHeight = area.offsetHeight - effectiveHeartSize - (padding * 2);

            if (safeWidth <= 0 || safeHeight <= 0) return;

            let attempts = 0;
            let pos;
            const maxAttempts = 50;  // lebih banyak percobaan biar hampir pasti dapat posisi bagus

            let valid = false;

            while (attempts < maxAttempts && !valid) {
                pos = {
                    left: Math.random() * safeWidth + padding + (effectiveHeartSize / 2),
                    top:  Math.random() * safeHeight + padding + (effectiveHeartSize / 2)
                };

                // Cek overlap & jarak pusat
                const hearts = area.querySelectorAll('.heart-catch');
                let tooCloseOrOverlap = false;

                for (let h of hearts) {
                    // Delay kecil agar rect update akurat (penting!)
                    const rect = h.getBoundingClientRect();
                    const areaRect = area.getBoundingClientRect();

                    const hX = (rect.left - areaRect.left) + (rect.width / 2);
                    const hY = (rect.top - areaRect.top) + (rect.height / 2);

                    const newX = pos.left;
                    const newY = pos.top;

                    const distance = Math.sqrt((newX - hX)**2 + (newY - hY)**2);

                    if (distance < minCenterDistance) {
                        tooCloseOrOverlap = true;
                        break;
                    }

                    // Bounding box check dengan toleransi
                    const newLeft   = newX - effectiveHeartSize / 2;
                    const newRight  = newX + effectiveHeartSize / 2;
                    const newTop    = newY - effectiveHeartSize / 2;
                    const newBottom = newY + effectiveHeartSize / 2;

                    const hLeft   = rect.left   - areaRect.left;
                    const hRight  = hLeft + rect.width;
                    const hTop    = rect.top    - areaRect.top;
                    const hBottom = hTop + rect.height;

                    if (
                        newLeft   < hRight  + 10 &&
                        newRight  > hLeft   - 10 &&
                        newTop    < hBottom + 10 &&
                        newBottom > hTop    - 10
                    ) {
                        tooCloseOrOverlap = true;
                        break;
                    }
                }

                if (!tooCloseOrOverlap) valid = true;
                attempts++;
            }

            // Gunakan posisi terakhir (fallback)
            const heart = document.createElement('div');
            heart.className = 'heart-catch';
            heart.innerHTML = '💖';
            heart.style.left = (pos.left - effectiveHeartSize / 2) + 'px';
            heart.style.top  = (pos.top  - effectiveHeartSize / 2) + 'px';

            heart.onclick = () => {
                catchScore++;
                document.getElementById('statusGame').textContent = `⏳: ${catchTimeLeft} detik | 💖: ${catchScore}`;
                
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = '✨';
                particle.style.left = heart.style.left;
                particle.style.top = heart.style.top;
                area.appendChild(particle);
                setTimeout(() => particle.remove(), 900);

                heart.remove();

                if (catchScore == 50) {
                    clearInterval(catchTimerId);
                    clearInterval(heartSpawner);
                    gameRunning = false;
                    setTimeout(() => {
                        document.getElementById(`hal2`).style = "transform:scale(0);transition:all .6s ease";
                        setTimeout(() => { pindahHal(3); }, 450);
                    }, 730);
                }
            };

            area.appendChild(heart);
            setTimeout(() => { if (heart.parentNode) heart.remove(); }, 2200);
        }, 400);
    }

    function isTooClose(newPos, minDistance, area) {
        const hearts = area.querySelectorAll('.heart-catch');
        if (hearts.length === 0) return false;

        const newX = newPos.left;
        const newY = newPos.top;

        for (let h of hearts) {
            const rect = h.getBoundingClientRect();
            const areaRect = area.getBoundingClientRect();

            const hX = (rect.left - areaRect.left) + (rect.width / 2);
            const hY = (rect.top - areaRect.top) + (rect.height / 2);

            const distance = Math.sqrt(
                Math.pow(newX - hX, 2) + Math.pow(newY - hY, 2)
            );

            if (distance < minDistance) return true;
        }
        return false;
    }

    function isOverlappingStrict(newPos, heartSize, area) {
        const hearts = area.querySelectorAll('.heart-catch');
        if (hearts.length === 0) return false;

        const newLeft   = newPos.left - heartSize / 2;
        const newTop    = newPos.top  - heartSize / 2;
        const newRight  = newLeft + heartSize;
        const newBottom = newTop  + heartSize;

        for (let h of hearts) {
            const rect = h.getBoundingClientRect();
            const areaRect = area.getBoundingClientRect();

            const hLeft   = rect.left   - areaRect.left;
            const hTop    = rect.top    - areaRect.top;
            const hRight  = hLeft + rect.width;
            const hBottom = hTop  + rect.height;

            // Tambah toleransi kecil agar lebih ketat (hindari hampir bersentuhan)
            if (
                newLeft   < hRight  + 5  &&
                newRight  > hLeft   - 5  &&
                newTop    < hBottom + 5  &&
                newBottom > hTop    - 5
            ) {
                return true;
            }
        }
        return false;
    }
