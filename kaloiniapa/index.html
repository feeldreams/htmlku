  <script>
  	var teksSekarang = 1;
    var ftom = 0;
    var pesanwhatsapp = "";
    const body = document.querySelector("body");

    // Simpan jawaban
    var jawabanUser = {2: null, 3: null, 4: null};
    var jawabanBenarMap = {2: false, 3: false, 4: false};

    const audio = document.getElementById("linkmp3"), btn = document.getElementById("musicBtn");
    btn.classList.add("pause");
    btn.onclick = () => {
      audio.paused ? (audio.play(), btn.className = "music-btn pause") : (audio.pause(), btn.className = "music-btn play");
    };

    var swiper = new Swiper(".mySwiper", {
      pagination: {el: ".swiper-pagination", dynamicBullets: true},
      allowTouchMove: false,
      on: {
        slideChange: function () {
          teksSekarang++;
          var teksScale   = document.querySelector('#teks'   + teksSekarang);
          var stikerScale = document.querySelector('#stiker' + teksSekarang);

          setTimeout(function () {
            if (teksScale)   teksScale.classList.add("scale1");
            if (stikerScale) stikerScale.classList.add("scale1");

            if (teksSekarang == 2) document.getElementById('pilihan2').classList.add("scale1");
            if (teksSekarang == 3) document.getElementById('pilihan3').classList.add("scale1");
            if (teksSekarang == 4) document.getElementById('pilihan4').classList.add("scale1");

            if (teksSekarang == 5) {
              var salahCount = 0;
              for (var k in jawabanBenarMap) { if (!jawabanBenarMap[k]) salahCount++; }

              var varteks5 = salahCount === 0
                ? '<b><span style="font-size:22px">Yeaayy!! 🫶</span></b><br><br>Makasii yaa udah mau jawab<br>semua pertanyaanku hhee 🫣<br><br><span style="font-size:22px">𖹭.ᐟ</span><br>Kirim hasil jawabannya<br>ke WhatsApp&nbsp;aku yaa 💕'
                : '<b style="font-size:22px">Yahhh! 😝</b><br><br>Karena kamu udah salah <b>' + salahCount + ' soal</b>, maka kamu harus ajak aku <b>📞 Call</b> yaa 🤣🫵<br><br>Ga boleh kabuurrr! 🏃🤪';

              pesanwhatsapp =
                "1.%20Jawaban%20slide%202:%0A" + encodeURIComponent(jawabanUser[2] || "-") +
                "%0A%0A2.%20Jawaban%20slide%203:%0A" + encodeURIComponent(jawabanUser[3] || "-") +
                "%0A%0A3.%20Jawaban%20slide%204:%0A" + encodeURIComponent(jawabanUser[4] || "-");

              katanimasi(varteks5);
            }
          }, 50);
        }
      },
      navigation: {nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev"}
    });

    function jawabPilihan(slideNum, jawaban, benar, jawabanBenarTeks) {
      jawabanUser[slideNum]     = jawaban;
      jawabanBenarMap[slideNum] = benar;

      var stikerImg  = document.getElementById('stikerImg' + slideNum);
      var urlSalah   = stikerImg.getAttribute('data-salah');

      var btns = document.querySelectorAll('#pilihan' + slideNum + ' .pilihan-btn');
      btns.forEach(function (b) { b.disabled = true; });
      //  ' + jawabanBenarTeks + '!
      if (!benar) {
        Swal.fire({
          title: '❌ SALAH! 😜',
          html:
            '<img class="swal-salah-img" src="' + stikerSalah.src + '" />' +
            '<br><b>Jawabannya ...</b>',
          timer: 1100,
          timerProgressBar: true,
          showConfirmButton: false,
          allowOutsideClick: false,
          allowEscapeKey: false,
          scrollbarPadding: false,
          heightAuto: false,
          backdrop: 'rgba(0,0,0,0.6)',
          customClass: {
            popup: 'swal2-popup',
            title: 'swal2-title',
            htmlContainer: 'swal2-html-container',
            timerProgressBar: 'swal2-timer-progress-bar'
          }
        }).then(function () {
            var stikerEl = document.getElementById('stiker' + slideNum);
            stikerEl.style.opacity   = '0';
            stikerEl.style.transform = 'scale(0)';
            setTimeout(function () {
                stikerImg.src            = urlSalah;
            }, 150);
            setTimeout(function () {
                stikerEl.style.opacity   = '1';
                stikerEl.style.transform = 'scale(1)';
            }, 300);

            setTimeout(function () {
                btns.forEach(function (b) {
                    var label = b.textContent.trim();
                    if (label.indexOf(jawaban) !== -1)          b.classList.add('salah');
                    if (label.indexOf(jawabanBenarTeks) !== -1) b.classList.add('benar');
                });

                setTimeout(function () {
                    swiper.slideNext();
                }, 2700);
            }, 200);
        });

      } else {
        btns.forEach(function (b) {
          if (b.textContent.trim().indexOf(jawaban) !== -1) b.classList.add('benar');
        });
        var stikerEl = document.getElementById('stiker' + slideNum);
            stikerEl.style.opacity   = '0';
            stikerEl.style.transform = 'scale(0)';
            setTimeout(function () {
                stikerImg.src            = urlSalah;
            }, 150);
            setTimeout(function () {
                stikerEl.style.opacity   = '1';
                stikerEl.style.transform = 'scale(1)';
            }, 300);
        setTimeout(function () { swiper.slideNext(); }, 3200);
      }
    }

    function katanimasi(varteks) {
      document.getElementById('teks5').innerHTML = "";
      new TypeIt("#teks5", {
        strings: ["" + varteks], startDelay: 250, speed: 22, cursor: true,
        afterComplete: function () {
          clearInterval(scrollInterval);
          document.getElementById('teks5').innerHTML = varteks;
          Tombol.style = "margin-top:30px;opacity:1;transform: scale(1);";
          ftom = 1;
          mulaiKelopak('game-canvas');
        }
      }).go();
    }

    // Animasi Kelopak Bunga
    let animationFrameId;
    function mulaiKelopak(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const kelopak = Array.from({length: 20}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 5 + 2,
        speed: Math.random() * 0.5 + 1
      }));
      function gambarKelopak() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        kelopak.forEach(petal => {
          ctx.beginPath();
          ctx.arc(petal.x, petal.y, petal.radius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.fill();
          petal.y += petal.speed;
          if (petal.y > canvas.height) petal.y = -petal.radius;
          petal.x += Math.sin(petal.y / 50) * 2;
        });
        animationFrameId = requestAnimationFrame(gambarKelopak);
      }
      gambarKelopak();
    }

    setTimeout(() => {
