
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alasan.feeldream.id</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/typeit@8.8.7/dist/index.umd.js"></script>
    <style>
        body { margin:0;padding:0;height:100vh;display:flex;justify-content:center;align-items:center;background-image:url('wp/4.jpg');background-size:cover;background-position:center;background-repeat:no-repeat;font-family:'Nunito',sans-serif;overflow-x:hidden;overflow-y:auto; }
        .card { border:4px dashed #ffb703;background:rgba(0,0,0,.75);padding:20px;border-radius:30px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.1);max-width:350px;width:90%;margin-left:20px;margin-right:20px;margin-top:-50px;position:relative;z-index:100;animation:popIn 0.5s cubic-bezier(0.68,-0.55,0.265,1.55); }
        .img-container { border:3px solid #ffb703;width:130px;height:130px;margin:0 auto 20px;border-radius:20px;overflow:hidden;background-color:#fff;box-shadow:0 5px 15px rgba(0,0,0,0.05); }
        .img-container img { width:100%;height:100%;object-fit:cover; }
        .title { font-family:'Fredoka One',cursive;color:#fb8500;margin:10px 0;font-size:28px;text-shadow:1px 1px 0px rgba(255,255,255,.3); }
        .kaomoji { font-size:18px;color:#fff;margin:5px 0;font-weight:bold; }
        .instruction { font-size:16px;color:#fff;margin:25px 0; }
        /* button { background-color:#ffb703;color:white;border:none;padding:12px 25px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;transition:transform 0.2s,background-color 0.2s,box-shadow 0.2s;box-shadow:0 4px 0px #fb8500; } */
        /* button:hover { transform:translateY(-2px);background-color:#ffcd58;box-shadow:0 6px 0px #fb8500; } */
        /* button:active { transform:translateY(2px);box-shadow:0 2px 0px #fb8500; } */
        button { background:#ffb703;color:#fff;border:none;padding:14px 30px;border-radius:999px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;transition:all 0.25s;box-shadow:0 5px 0 #fb8500;position:relative;overflow:hidden; }
        button::before { content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,#fff5,#fff2,transparent);transition:0.6s; }
        button:hover::before { left:100%; }
        button:hover { transform:translateY(-3px);background:#ffcd58;box-shadow:0 8px 0 #fb8500; }
        button:active { transform:translateY(3px);box-shadow:0 2px 0 #fb8500; }
        #replyBtn{transform: scale(0);opacity:0;transition:all 0.7s ease;}
        .hidden { display:none; }
        .btn-group { display:flex;gap:15px;justify-content:center;margin-top:20px; }
        .btn-secondary { background-color:#ff6b6b;box-shadow:0 4px 0px #ee5253;margin-left:10px; }
        .btn-secondary:hover { background-color:#ff8787;box-shadow:0 6px 0px #ee5253; }
        .btn-secondary:active { transform:translateY(2px);box-shadow:0 2px 0px #ee5253; }
        .message-box { border:2px solid #ffb703;border-radius:15px;padding:15px;margin:20px 0;text-align:left;font-size:16px;color:#fff;/*background-color:#fffdf5;*/height:180px;overflow-y:auto;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none; }
        .message-box::-webkit-scrollbar { display:none; }
        .message-box .kaomoji { text-align:center;display:block;margin-bottom:10px;color:#fb8500; }
        .music-control { position:fixed;display:none;top:20px;right:20px;background-color:rgba(255,255,255,0.8);border:2px solid #ffb703;border-radius:50%;width:50px;height:50px;justify-content:center;align-items:center;cursor:pointer;z-index:1000;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:all 0.3s ease; }
        .music-control:hover { transform:scale(1.1);background-color:#fff; }
        .music-icon { width:24px;height:24px;fill:#fb8500; }
        @keyframes popIn { 0% { transform:scale(0);opacity:0; } 80% { transform:scale(1.1);opacity:1; } 100% { transform:scale(1); } }
    </style>
</head>
<body>
    <div class="card hidden" id="mainCard">
        <div class="img-container">
            <img src="https://htmlku.com/0/panda/hearthappy.gif" alt="Cute Photo">
        </div>
        <h1 class="title">Hiii Sayanggg</h1>
        <p class="kaomoji">( ｡ • ᴗ • ｡ )</p>
        <p class="instruction">Click the next button!! (⊃｡•́‿•̀｡)⊃♥</p>
        <button id="nextBtn">Next!! ^w^</button>
    </div>

    <div class="card hidden" id="envelopeCard">
        <div class="img-container">
            <img src="https://media1.tenor.com/m/nmc3ubvvxPkAAAAC/nailong-yellow-dino.gif" alt="Envelope">
        </div>
        <h1 class="title">Do you want to open it?</h1>
        <div class="btn-group">
            <button id="openBtn">Open it</button>
            <button id="noBtn" class="btn-secondary">No ty</button>
        </div>
    </div>

    <div class="card hidden" id="retryCard">
        <div class="img-container">
            <img src="https://media1.tenor.com/m/zuHWKHqDHK0AAAAd/nailong-yellow-dragon.gif" alt="Sad Face">
        </div>
        <h1 class="title" style="font-size: 24px;">Nooo.. Let's try again, Please..? >_&lt;</h1>
        <button id="retryBtn" style="margin-top:20px">Again..?</button>
    </div>

    <div class="card hidden" id="messageCard" style="padding:20px 8px">
        <div class="img-container" id="imgAkhir" style="border-radius:50%;width:120px;height:120px">
            <img src="https://htmlku.com/0/panda/fotbar.gif" id="sourceImgAkhirSatu" alt="Happy Birthday">
            <img src="https://htmlku.com/0/panda/muah.gif" id="sourceImgAkhirDua" style="display:none;" alt="Happy Birthday">
        </div>
        
        <div class="message-box" id="messageContent">
            <span class="kaomoji">(^○^)</span>
        </div>
        
        <button id="replyBtn">Balas (^○^)</button>
    </div>

    <!-- Music Control Button -->
    <div class="music-control" id="musicBtn">
        <svg class="music-icon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
    </div>

    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/vg4o2l.m4a" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        const nextBtn = document.getElementById('nextBtn');
        const openBtn = document.getElementById('openBtn');
        const noBtn = document.getElementById('noBtn');
        const retryBtn = document.getElementById('retryBtn');
        const replyBtn = document.getElementById('replyBtn');
        const mainCard = document.getElementById('mainCard');
        const envelopeCard = document.getElementById('envelopeCard');
        const retryCard = document.getElementById('retryCard');
        const messageCard = document.getElementById('messageCard');
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isMusicPlaying = false;

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const mainCard = document.getElementById('mainCard');
                mainCard.classList.remove('hidden');
                mainCard.style.opacity = '0';
                mainCard.style.transition = 'opacity 1.2s ease';
                setTimeout(() => {
                    mainCard.style.opacity = '1';
                }, 50);
            }, 2000);
        });

        // Try to play music immediately
        window.addEventListener('load', () => {
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                updateMusicIcon();
            }).catch(error => {
                console.log("Autoplay prevented. Waiting for interaction.");
                isMusicPlaying = false;
                updateMusicIcon();
            });
        });

        // Ensure music plays on any first click (browser policy often requires this)
        document.addEventListener('click', function() {
            if (!isMusicPlaying) {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    updateMusicIcon();
                });
            }
        }, { once: true });

        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent triggering the document click listener
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
            } else {
                bgMusic.play();
                isMusicPlaying = true;
            }
            updateMusicIcon();
        });

        function updateMusicIcon() {
            const iconPath = isMusicPlaying 
                ? "M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" // Music Note
                : "M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"; // Mute/Off

            const svg = musicBtn.querySelector('svg path');
            if(isMusicPlaying) {
                 svg.setAttribute('d', "M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z");
                 musicBtn.style.opacity = "1";
            } else {
                 svg.setAttribute('d', "M4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"); 
            }
        }

        nextBtn.addEventListener('click', () => {
            mainCard.style.display = 'none';
            envelopeCard.classList.remove('hidden');
        });

        openBtn.addEventListener('click', () => {
            envelopeCard.style.display = 'none';
            messageCard.classList.remove('hidden');

            let scrollInterval = setInterval(scrollToBottom, 20);

            new TypeIt("#messageContent", {
                speed: 20,
                waitUntilVisible: true,
                cursorChar: '_',
                cursor: true,
                afterComplete: function(instance) {
                    instance.destroy();
                    clearInterval(scrollInterval);
                    replyBtn.style="transform: scale(1);opacity:1";

                    imgAkhir.style="border-radius:50%;width:120px;height:120px;transform: scale(0);transition: all 0.5s ease;";
                    setTimeout(() => {
                        sourceImgAkhirSatu.src = sourceImgAkhirDua.src;
                        imgAkhir.style="border-radius:50%;width:120px;height:120px;transform: scale(1);transition: all 0.5s ease;";
                    }, 350);
                }
            })
            .type("<b>🎉 Aloo sayanggg hhii 💕</b><br><br>")
            .pause(15)
            .type("<i>You know?</i> Alasan akuu pertahanin kamuu? 🥹<br><br>")
            .pause(15)
            .type("Karena.. Kamuu ituu beda dari yang lain, kamuu itu sempurna menurut akuu ✨<br><br>")
            .pause(15)
            .type("Meskipun kamuu sering marah² dan ego kamuu sangat tinggi, tapi bukan berarti akuu nyerah buat perjuangin kamuu 🌻<br><br>")
            .pause(15)
            .type("Kamuu itu tujuan akuu dan kamu satu-satunya di hati akuu, kamuu akan selalu akuu perjuangkan meskipun tantangannya berat 💝<br><br>")
            .pause(15)
            .type("Jangan pernah mikir kalo akuu bakal ninggalin kamu yaaa? Akuu janji bakalan pertahanin kamuu dalam keadaan apapun 🫶<br><br>")
            .pause(15)
            .type("Ohh yaaa jangan bilang kalo akuu ini gaa sayang sama kamuu yaa, dalam kondisi apapun, dan mauu bagaimana pun kamuu, akuu bakalan tetep sayangg samaa kamu hhee, semoga kamuu bisa bertahan sama akuuu dan sabar yaaa? 👀<br><br><b>i lovee youu sayaangku cintakuu duniakuu manisnya akuu</b> 😍🤍<br>")
            .pause(15)
            .go();
        });

        function scrollToBottom() {
            const messageBox = document.getElementById('messageContent');
            if (messageBox) {
                messageBox.scrollTop = messageBox.scrollHeight;
            }
        }

        noBtn.addEventListener('click', () => {
            envelopeCard.style.display = 'none';
            retryCard.classList.remove('hidden');
        });

        retryBtn.addEventListener('click', () => {
            retryCard.classList.add('hidden');
            envelopeCard.style.display = 'block';
        });
    </script>
</body>
</html>
